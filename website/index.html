<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote Yes — Corvallis Charter Measures, May 2026</title>
  <style>
    :root {
      --color-autumn:          #CA6534;
      --color-oak-leaf:        #415526;
      --color-rye-grass:       #668343;
      --color-light-green:     #B1C58F;
      --color-lightest-green:  #EDF3D3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: Arial, sans-serif;
      background: var(--color-autumn);
      color: #fff;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .eyebrow {
      font-size: .82rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      opacity: .75;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: .75rem;
    }

    .measures {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 600;
      opacity: .9;
      margin-bottom: 2rem;
      white-space: nowrap;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: var(--color-light-green);
      border-radius: 999px;
      margin: 0 auto 2rem;
      opacity: .6;
    }

    .early-access {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 12px;
      padding: 1.25rem 2rem;
      max-width: 420px;
    }

    .early-access p {
      font-size: .95rem;
      opacity: .85;
    }

    .early-access p + p {
      margin-top: .5rem;
    }

    .early-access a {
      display: inline-block;
      margin-top: .85rem;
      background: var(--color-oak-leaf);
      color: #fff;
      font-weight: 700;
      font-size: .9rem;
      padding: .55rem 1.5rem;
      border-radius: 999px;
      text-decoration: none;
    }

    .early-access a:hover { background: var(--color-rye-grass); }

    footer {
      position: fixed;
      bottom: 1.25rem;
      font-size: .78rem;
      opacity: .5;
    }
  </style>
</head>
<body>
  <p class="eyebrow">City of Corvallis &bull; May 19, 2026 Ballot</p>
  <h1>Vote YES on Measures</h1>
  <p class="measures">2&#8209;143 &nbsp;&bull;&nbsp; 2&#8209;144 &nbsp;&bull;&nbsp; 2&#8209;145 &nbsp;&bull;&nbsp; 2&#8209;146</p>

  <div class="divider"></div>

  <div class="early-access">
    <p>Under construction. Launching May 23, 2026.</p>
    <a href="mailto:webmaster@goodgovernancecorvallis.org">Reach out for early access</a>
  </div>

  <footer>Paid for by Good Governance Corvallis (#24834)</footer>
</body>
</html>
